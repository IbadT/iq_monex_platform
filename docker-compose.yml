version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: platform_nest_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP порт для приложения
      - "15672:15672" # Management UI (веб-интерфейс)
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rabbitmq_network

volumes:
  rabbitmq_data:

networks:
  rabbitmq_network:
    driver: bridge
