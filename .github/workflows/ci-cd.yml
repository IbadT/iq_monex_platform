name: CI-CD pipeline

on: 
    push:
        branches:
            - dev
            - main

    pull_request:
        branches:
            - dev
            - main


jobs:
    check:
        runs-on: ubuntu-latest
        name: Setup, builds, tests
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: "npm"
            
            - name: Install dependencies
              run: npm ci

            - name: Setup environment variables
              run: cp .env.example .env
            - name: Generate Prisma Client
              run: npm run prisma:generate
            - name: Testing app
              run: npm run test
            - name: Build app
              run: npm run build